name: Validador de Integridade da Rede

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-blockchain:
    runs-on: ubuntu-latest

    steps:
      - name: Baixando o Código do Repositório
        uses: actions/checkout@v4

      - name: Configurando o ambiente Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilando o Projeto e o Validador
        run: |
          cd src
          javac -cp "../lib/gson-2.11.0.jar:." BlockChain/*.java Validator.java

      - name: Executando Teste de Imutabilidade
        run: |
          cd src
          java -cp "../lib/gson-2.11.0.jar:." Validator